<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Brussel Parkings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<button id="themeBtn">🌙 Dark mode</button>
<h1>Publieke parkings Brussel</h1>
<div class="container">

    <p id="introText">
        Een plaats vinden in de stad Brussel is soms moeilijk. 
        Op deze website krijg je een overzicht van publieke parkings 
        met nuttige informatie zoals capaciteit, hoogte en locatie.
    </p>

    <input type="text" id="searchInput" placeholder="Zoek specifieke parking">
    <button id="toggleFavs">Toon favorieten</button>
</div>
<p id="welkom"></p>


<table id="parkingTable">
 <thead>
    <tr>
        <th data-key="name_nl">Naam</th>
        <th data-key="adres_">Adres</th>
        <th data-key="operator_fr">Operator</th>
        <th data-key="capacity">Capaciteit</th>
        <th data-key="maxheight">Hoogte</th>
        <th data-key="commune_gemeente">Gemeente</th>
        <th>Afbeelding</th>
        <th>Favoriet</th>
    </tr>
    
</thead>
    <tbody></tbody>
</table>
<form id="testForm">
    <input type="text" id="naam" placeholder="Typ je naam" required>
    <button type="submit" id="submit">Submit</button>
</form>
<script src="parking.js"></script>
</body>
</html>
